    /* ==============================================================
       REGULATORY DEFINITIONS (for tooltips)
       ============================================================== */

    const DEFINITIONS = {
      "abuse": "The willful infliction of injury, unreasonable confinement, intimidation, or punishment with resulting physical harm, pain or mental anguish.",
      "neglect": "The failure of the facility, its employees or service providers to provide goods and services necessary to avoid physical harm, pain, mental anguish or emotional distress.",

      "injuries of unknown source": "An injury where: source not observed, not explained by resident, and suspicious due to extent/location/pattern.",
      "mistreatment": "Inappropriate treatment or exploitation of a resident.",
    };

    function applyTooltips(text) {
      if (!text) return text;
      const sortedTerms = Object.keys(DEFINITIONS).sort((a, b) => b.length - a.length);
      const parts = [];
      let remaining = text;
      let key = 0;

      while (remaining.length > 0) {
        let earliestIdx = remaining.length;
        let matchedTerm = null;

        for (const term of sortedTerms) {
          const idx = remaining.toLowerCase().indexOf(term.toLowerCase());
          if (idx !== -1 && idx < earliestIdx) {
            earliestIdx = idx;
            matchedTerm = term;
          }
        }

        if (matchedTerm === null) {
          parts.push(remaining);
          break;
        }

        if (earliestIdx > 0) {
          parts.push(remaining.substring(0, earliestIdx));
        }

        const originalText = remaining.substring(earliestIdx, earliestIdx + matchedTerm.length);
        parts.push(
          <span key={key++} className="tooltip-trigger" data-tooltip={DEFINITIONS[matchedTerm]}>
            {originalText}
          </span>
        );

        remaining = remaining.substring(earliestIdx + matchedTerm.length);
      }

      return parts;
    }

    /* ==============================================================

    const INITIAL_INSTRUCTION_TEXT = `This form can be used to ensure the reporting of reasonable suspicion of crimes against a resident or individual receiving care from the facility within prescribed timeframes to the appropriate entities, consistent with Section 1150B of the Act; and all alleged violations involving abuse, neglect, exploitation or mistreatment, including injuries of unknown source and misappropriation of resident property. The information collected is critical in determining what may be occurring in a facility and the effect(s) that it may have on residents.

Section 1150B(b) of the Social Security Act \u2014
\u2022 result in serious bodily injury, the individual shall report the suspicion immediately, but not later than 2 hours after forming the suspicion; and
\u2022 do not result in serious bodily injury, the individual shall report the suspicion not later than 24 hours after forming the suspicion.
Each covered individual shall report to the Secretary and 1 or more law enforcement entities for the political subdivision in which the facility is located any reasonable suspicion of a crime (as defined by the law of the applicable political subdivision) against any individual who is a resident of, or is receiving care from, the facility.
Timing \u2014 If the events that cause the suspicion\u2014

42 C.F.R. 483.12(c)(1) (F609) - In response to allegations of abuse, neglect, exploitation, or mistreatment, the facility must: (1) Ensure that all alleged violations involving abuse, neglect, exploitation or mistreatment, including injuries of unknown source and misappropriation of resident property, are reported immediately, but not later than 2 hours after the allegation is made, if the events that cause the allegation involve abuse or result in serious bodily injury, or not later than 24 hours if the events that cause the allegation do not involve abuse and do not result in serious bodily injury, to the administrator of the facility and to other officials (including to the State Survey Agency and adult protective services where state law provides for jurisdiction in long-term care facilities) in accordance with State law through established procedures.

483.12(c)(4) - Report the results of all investigations to the administrator or his or her designated representative and to other officials in accordance with State law, including to the State Survey Agency, within 5 working days of the incident, and if the alleged violation is verified appropriate corrective action must be taken.

\u201cAbuse,\u201d is defined at \u00a7483.5 as \u201cthe willful infliction of injury, unreasonable confinement, intimidation, or punishment with resulting physical harm, pain or mental anguish. Abuse also includes the deprivation by an individual, including a caretaker, of goods or services that are necessary to attain or maintain physical, mental, and psychosocial well-being. Instances of abuse of all residents, irrespective of any mental or physical condition, cause physical harm, pain or mental anguish. It includes verbal abuse, sexual abuse, physical abuse, and mental abuse including abuse facilitated or enabled through the use of technology.\u201d

\u201cAlleged violation\u201d is a situation or occurrence that is observed or reported by staff, resident, relative, visitor or others but has not yet been investigated and, if verified, could be noncompliance with the Federal requirements related to mistreatment, exploitation, neglect, or abuse, including injuries of unknown source, and misappropriation of resident property.

\u201cCrime\u201d: Section 1150B(b)(1) of the Act provides that a \u201ccrime\u201d is defined by law of the applicable political subdivision where the facility is located. A political subdivision would be a city, county, township or village, or any local unit of government created by or pursuant to State law.

\u201cCriminal sexual abuse\u201d: In the case of \u201ccriminal sexual abuse\u201d which is defined in section 2011(19)(B) of the Act (as added by section 6703(a)(1)(C) of the Affordable Care Act), serious bodily injury/harm shall be considered to have occurred if the conduct causing the injury is conduct described in section 2241 (relating to aggravated sexual abuse) or section 2242 (relating to sexual abuse) of Title 18, United States Code, or any similar offense under State law. In other words, serious bodily injury includes sexual intercourse with a resident by force or incapacitation or through threats of harm to the resident or others or any sexual act involving a child. Serious bodily injury also includes sexual intercourse with a resident who is incapable of declining to participate in the sexual act or lacks the ability to understand the nature of the sexual act.

\u201cExploitation,\u201d as defined at \u00a7483.5, means \u201ctaking advantage of a resident for personal gain, through the use of manipulation, intimidation, threats, or coercion.\u201d

\u201cInjuries of unknown source\u201d \u2014 An injury should be classified as an \u201cinjury of unknown source\u201d when all of the following criteria are met:
The source of the injury was not observed by any person; and
The source of the injury could not be explained by the resident; and
The injury is suspicious because of the extent of the injury or the location of the injury (e.g., the injury is located in an area not generally vulnerable to trauma) or the number of injuries observed at one particular point in time or the incidence of injuries over time.

\u201cMisappropriation of resident property,\u201d as defined at \u00a7483.5, means \u201cthe deliberate misplacement, exploitation, or wrongful, temporary, or permanent use of a resident\u2019s belongings or money without the resident\u2019s consent.\u201d

\u201cMistreatment,\u201d as defined at \u00a7483.5, is \u201cinappropriate treatment or exploitation of a resident.\u201d

\u201cNeglect,\u201d as defined at \u00a7483.5, means \u201cthe failure of the facility, its employees or service providers to provide goods and services to a resident that are necessary to avoid physical harm, pain, mental anguish or emotional distress.\u201d

\u201cSerious bodily injury\u201d means an injury involving extreme physical pain; involving substantial risk of death; involving protracted loss or impairment of the function of a bodily member, organ, or mental faculty; requiring medical intervention such as surgery, hospitalization, or physical rehabilitation; or an injury resulting from criminal sexual abuse (See section 2011(19)(A) of the Act).

\u201cSexual abuse,\u201d is defined at \u00a7483.5 as \u201cnon-consensual sexual contact of any type with a resident.\u201d

\u201cWillful,\u201d is defined at \u00a7483.5 in the definition of \u201cabuse,\u201d and \u201cmeans the individual must have acted deliberately, not that the individual must have intended to inflict injury or harm.\u201d`;

    function todayStr() { return new Date().toISOString().slice(0, 10); }

    function nowTimeStr() {
      const d = new Date();
      return d.getHours().toString().padStart(2, "0") + ":" + d.getMinutes().toString().padStart(2, "0");
    }

    function formatDateDisplay(iso) {
      if (!iso) return "";
      const [y, m, d] = iso.split("-");
      return m + "/" + d + "/" + y;
    }

    function formatTimeDisplay(t) {
      if (!t) return "";
      const parts = t.split(":");
      let h = parseInt(parts[0], 10);
      const suffix = h >= 12 ? "PM" : "AM";
      if (h === 0) h = 12; else if (h > 12) h -= 12;
      return h + ":" + parts[1] + " " + suffix;
    }

    function formatPhone(val) {
      const d = val.replace(/\D/g, "");
      if (d.length >= 10) return "(" + d.slice(0,3) + ") " + d.slice(3,6) + "-" + d.slice(6,10);
      return val;
    }

    function downloadBlob(blob, filename) {
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url; a.download = filename;
      document.body.appendChild(a); a.click();
      document.body.removeChild(a); URL.revokeObjectURL(url);
    }

    /* ==============================================================
       SELF-REPORT LINK COMPONENT
       ============================================================== */

    function SelfReportLink() {
      return (
        <div className="mt-6 pt-4 border-t border-gray-200 text-center">
          <a href="https://app.smartsheet.com/b/form/d41b00fe14014f2d9e3395dd5e59c900"
             target="_blank" rel="noopener noreferrer"
             className="text-sm text-mdh-light hover:text-mdh-blue underline">
            Click here to submit a Self Report
          </a>
        </div>
      );
    }

    /* ==============================================================
       FIELD COMPONENTS
       ============================================================== */

    function FieldWrapper({ label, error, helperText, children }) {
      return (
        <div className="mb-5">
          <label className="block text-sm font-semibold text-gray-700 mb-1">
            {applyTooltips(label)}
          </label>
          {helperText && (
            <div className="text-sm text-gray-500 mb-2 whitespace-pre-line bg-gray-50 border border-gray-200 rounded p-3">
              {helperText}
            </div>
          )}
          {children}
          {error && <p className="mt-1 text-sm text-red-600 font-medium">{error}</p>}
        </div>
      );
    }

    function TextFieldComp({ id, value, onChange, type, placeholder, error, label, helperText }) {
      return (
        <FieldWrapper label={label} error={error} helperText={helperText}>
          <input type={type || "text"} value={value || ""} onChange={e => onChange(id, e.target.value)}
            placeholder={placeholder} className={"field-input" + (error ? " error" : "")} />
        </FieldWrapper>
      );
    }

    function TextAreaComp({ id, value, onChange, placeholder, error, label, helperText, rows }) {
      const len = (value || "").length;
      return (
        <FieldWrapper label={label} error={error} helperText={helperText}>
          <textarea value={value || ""} rows={rows || 6} onChange={e => onChange(id, e.target.value)}
            placeholder={placeholder} className={"field-input" + (error ? " error" : "")}
            style={{ minHeight: ((rows || 6) * 1.5) + "rem" }} />
          <p className="text-xs text-gray-400 mt-1 text-right">{len} characters</p>
        </FieldWrapper>
      );
    }

    function DateComp({ id, value, onChange, error, label, helperText }) {
      return (
        <FieldWrapper label={label} error={error} helperText={helperText}>
          <input type="date" value={value || ""} onChange={e => onChange(id, e.target.value)}
            className={"field-input max-w-xs" + (error ? " error" : "")} />
        </FieldWrapper>
      );
    }

    function TimeComp({ id, value, onChange, error, label, helperText }) {
      return (
        <FieldWrapper label={label} error={error} helperText={helperText}>
          <input type="time" value={value || ""} onChange={e => onChange(id, e.target.value)}
            className={"field-input max-w-xs" + (error ? " error" : "")} style={{ maxWidth: "200px" }} />
        </FieldWrapper>
      );
    }

    function PhoneComp({ id, value, onChange, error, label, helperText }) {
      return (
        <FieldWrapper label={label} error={error} helperText={helperText}>
          <input type="tel" value={value || ""} onChange={e => onChange(id, formatPhone(e.target.value))}
            placeholder="(###) ###-####" className={"field-input max-w-xs" + (error ? " error" : "")} />
        </FieldWrapper>
      );
    }

    function EmailComp({ id, value, onChange, error, label, helperText }) {
      return (
        <FieldWrapper label={label} error={error} helperText={helperText}>
          <input type="email" value={value || ""} onChange={e => onChange(id, e.target.value)}
            placeholder="email@example.com" className={"field-input max-w-md" + (error ? " error" : "")} />
        </FieldWrapper>
      );
    }

    function RadioComp({ id, value, onChange, options, error, label, helperText }) {
      return (
        <FieldWrapper label={label} error={error} helperText={helperText}>
          <div className="flex flex-wrap gap-3 mt-1">
            {options.map(opt => (
              <button key={opt} type="button" onClick={() => onChange(id, opt)}
                className={"px-6 py-3 rounded-lg border-2 text-base font-semibold transition-colors cursor-pointer " +
                  (value === opt ? "bg-mdh-blue text-white border-mdh-blue" : "bg-white text-gray-700 border-gray-300 hover:border-mdh-light hover:bg-mdh-accent")}>
                {opt}
              </button>
            ))}
          </div>
        </FieldWrapper>
      );
    }

    /* ==============================================================
       GENERIC FIELD RENDERER
       ============================================================== */

    function renderField(field, formData, updateField, errors) {
      if (field.showWhen) {
        const depVal = formData[field.showWhen.field];
        if (!field.showWhen.values.includes(depVal)) return null;
      }
      const p = { id: field.id, value: formData[field.id], onChange: updateField, error: errors[field.id],
        label: field.label, helperText: field.helperText, placeholder: field.placeholder };
      switch (field.type) {
        case "text": return <TextFieldComp key={field.id} {...p} />;
        case "textarea": return <TextAreaComp key={field.id} {...p} rows={field.rows} />;
        case "date": return <DateComp key={field.id} {...p} />;
        case "time": return <TimeComp key={field.id} {...p} />;
        case "tel": return <PhoneComp key={field.id} {...p} />;
        case "email": return <EmailComp key={field.id} {...p} />;
        case "radio": return <RadioComp key={field.id} {...p} options={field.options} />;
        default: return <TextFieldComp key={field.id} {...p} />;
      }
    }

    /* ==============================================================
       ALLEGATION TYPE STEP
       ============================================================== */

    function AllegationTypeStep({ formData, updateField, errors }) {
      const selected = formData.allegation_types || [];
      const details = formData.allegation_details || {};
      const toggle = (optId) => {
        const next = selected.includes(optId) ? selected.filter(x => x !== optId) : [...selected, optId];
        updateField("allegation_types", next);
      };
      return (
        <div>
          <p className="text-sm text-gray-600 mb-4 bg-blue-50 border border-blue-200 rounded p-3">
            Select all categories that apply to the reporting incident. For each selected type, you may provide additional details.
          </p>
          {errors.allegation_types && <p className="text-sm text-red-600 font-medium mb-3">{errors.allegation_types}</p>}
          <div className="space-y-2">
            {ALLEGATION_OPTIONS.map(opt => {
              const on = selected.includes(opt.id);
              return (
                <div key={opt.id}>
                  <button type="button" onClick={() => toggle(opt.id)}
                    className={"w-full text-left px-4 py-3 rounded-lg border-2 flex items-center gap-3 transition-colors cursor-pointer " +
                      (on ? "bg-mdh-accent border-mdh-blue" : "bg-white border-gray-200 hover:border-gray-400")}>
                    <div className={"w-6 h-6 rounded border-2 flex items-center justify-center flex-shrink-0 " +
                      (on ? "bg-mdh-blue border-mdh-blue" : "border-gray-400")}>
                      {on && <svg className="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={3} d="M5 13l4 4L19 7" /></svg>}
                    </div>
                    <span className="text-base font-medium">{applyTooltips(opt.label)}</span>
                  </button>
                  {on && (
                    <div className="ml-9 mt-2 mb-3">
                      <textarea value={details[opt.id] || ""} onChange={e => updateField("allegation_details", { ...details, [opt.id]: e.target.value })}
                        placeholder={"Additional details for " + opt.label + " (optional)"} rows={3} className="field-input resize-y text-sm" />
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    /* ==============================================================
       MULTI-ENTRY STEP
       ============================================================== */

    function MultiEntryStep({ step, formData, updateField, errors }) {
      const entries = formData[step.dataKey] || [];
      const addEntry = () => {
        const blank = {}; step.fields.forEach(f => { blank[f.id] = ""; });
        updateField(step.dataKey, [...entries, blank]);
      };
      const removeEntry = idx => {
        if (entries.length <= (step.minEntries || 0)) return;
        updateField(step.dataKey, entries.filter((_, i) => i !== idx));
      };
      const updateEntry = (idx, fid, val) => {
        const next = entries.map((e, i) => i === idx ? { ...e, [fid]: val } : e);
        updateField(step.dataKey, next);
      };
      return (
        <div>
          {step.instructions && <p className="text-sm text-gray-600 mb-4 bg-blue-50 border border-blue-200 rounded p-3">{step.instructions}</p>}
          {entries.map((entry, idx) => (
            <div key={idx} className="border border-gray-200 rounded-lg p-5 mb-4 bg-white shadow-sm">
              <div className="flex justify-between items-center mb-4">
                <h4 className="text-base font-semibold text-mdh-blue">{step.entryLabel} #{idx + 1}</h4>
                {entries.length > (step.minEntries || 0) && (
                  <button type="button" onClick={() => removeEntry(idx)}
                    className="px-4 py-2 text-sm font-semibold text-red-700 bg-red-50 border border-red-300 rounded-md hover:bg-red-100 cursor-pointer">
                    Remove
                  </button>
                )}
              </div>
              {step.fields.map(field => {
                const errKey = step.dataKey + "[" + idx + "]." + field.id;
                if (field.type === "date") {
                  return <DateComp key={field.id} id={field.id} label={field.label}
                    value={entry[field.id]} onChange={(fid, val) => updateEntry(idx, fid, val)} error={errors[errKey]} />;
                }
                return <TextFieldComp key={field.id} id={field.id} label={field.label}
                  value={entry[field.id]} placeholder={field.placeholder}
                  onChange={(fid, val) => updateEntry(idx, fid, val)} error={errors[errKey]} />;
              })}
            </div>
          ))}
          <button type="button" onClick={addEntry}
            className="inline-flex items-center px-6 py-3 text-sm font-semibold text-mdh-blue bg-white border-2 border-mdh-blue rounded-lg hover:bg-mdh-accent cursor-pointer">
            + Add Another {step.entryLabel}
          </button>
        </div>
      );
    }

    /* ==============================================================
       WITNESS ENTRY STEP
       ============================================================== */

    function WitnessEntryStep({ formData, updateField, errors }) {
      const noW = formData.no_witnesses || false;
      const ws = formData.witnesses || [];
      const wFields = [
        { id: "name", label: "Full Name" },
        { id: "position", label: "Position, if staff" },
        { id: "relationship", label: "Relationship to alleged victim" },
        { id: "contact", label: "Contact information, if known" },
      ];
      const addW = () => updateField("witnesses", [...ws, { name: "", position: "", relationship: "", contact: "" }]);
      const removeW = idx => updateField("witnesses", ws.filter((_, i) => i !== idx));
      const updateW = (idx, fid, val) => {
        const next = ws.map((e, i) => i === idx ? { ...e, [fid]: val } : e);
        updateField("witnesses", next);
      };
      return (
        <div>
          <a href="witness-statement.html" target="_blank" rel="noopener noreferrer"
            className="flex items-center gap-3 w-full px-4 py-3 mb-4 rounded-lg border-2 border-mdh-light bg-blue-50 hover:bg-mdh-accent transition-colors text-mdh-blue font-semibold text-base cursor-pointer"
            style={{textDecoration:"none"}}>
            <svg className="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>
            Open Witness / Staff / Patient Statement Form
            <svg className="w-4 h-4 ml-auto flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" /></svg>
          </a>
          <button type="button" onClick={() => { updateField("no_witnesses", !noW); if (!noW) updateField("witnesses", []); }}
            className={"w-full text-left px-4 py-3 rounded-lg border-2 flex items-center gap-3 mb-4 transition-colors cursor-pointer " +
              (noW ? "bg-mdh-accent border-mdh-blue" : "bg-white border-gray-200 hover:border-gray-400")}>
            <div className={"w-6 h-6 rounded border-2 flex items-center justify-center flex-shrink-0 " +
              (noW ? "bg-mdh-blue border-mdh-blue" : "border-gray-400")}>
              {noW && <svg className="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={3} d="M5 13l4 4L19 7" /></svg>}
            </div>
            <span className="text-base font-medium">No witnesses to report</span>
          </button>
          {!noW && (
            <>
              {ws.map((w, idx) => (
                <div key={idx} className="border border-gray-200 rounded-lg p-5 mb-4 bg-white shadow-sm">
                  <div className="flex justify-between items-center mb-4">
                    <h4 className="text-base font-semibold text-mdh-blue">Witness #{idx + 1}</h4>
                    <button type="button" onClick={() => removeW(idx)}
                      className="px-4 py-2 text-sm font-semibold text-red-700 bg-red-50 border border-red-300 rounded-md hover:bg-red-100 cursor-pointer">Remove</button>
                  </div>
                  {wFields.map(f => (
                    <TextFieldComp key={f.id} id={f.id} label={f.label}
                      value={w[f.id]} onChange={(fid, val) => updateW(idx, fid, val)}
                      error={errors["witnesses[" + idx + "]." + f.id]} />
                  ))}
                </div>
              ))}
              <button type="button" onClick={addW}
                className="inline-flex items-center px-6 py-3 text-sm font-semibold text-mdh-blue bg-white border-2 border-mdh-blue rounded-lg hover:bg-mdh-accent cursor-pointer">
                + Add Witness
              </button>
              {ws.length === 0 && errors.witnesses && <p className="text-sm text-red-600 font-medium mt-2">{errors.witnesses}</p>}
            </>
          )}
        </div>
      );
    }

    /* ==============================================================
       CONCLUSION STEP (Follow-Up)
       ============================================================== */

    function ConclusionStep({ formData, updateField, errors }) {
      const f = formData.conclusion_finding;
      return (
        <div>
          <RadioComp id="conclusion_finding" label="Investigation finding"
            value={f} onChange={updateField} options={["Verified", "Not Verified", "Inconclusive"]} error={errors.conclusion_finding} />
          {f === "Verified" && <TextAreaComp id="conclusion_verified" label="Describe the evidence that verified the allegation"
            value={formData.conclusion_verified} onChange={updateField} rows={6} error={errors.conclusion_verified} />}
          {f === "Not Verified" && <TextAreaComp id="conclusion_not_verified" label="Describe why the allegation could not be verified"
            value={formData.conclusion_not_verified} onChange={updateField} rows={6} error={errors.conclusion_not_verified} />}
          {f === "Inconclusive" && <TextAreaComp id="conclusion_inconclusive" label="Describe how this determination was reached \u2014 insufficient information"
            value={formData.conclusion_inconclusive} onChange={updateField} rows={6} error={errors.conclusion_inconclusive} />}
          <TextAreaComp id="injury_abuse_neglect"
            label="For injuries of unknown source: Did the investigation determine whether the injury resulted from abuse or neglect?"
            value={formData.injury_abuse_neglect} onChange={updateField} rows={4} error={errors.injury_abuse_neglect}
            helperText='Complete this field if "Injury of Unknown Source" was an allegation type. Otherwise, enter N/A.' />
        </div>
      );
    }

    /* ==============================================================
       CORRECTIVE ACTIONS STEP (Follow-Up)
       ============================================================== */

    function CorrectiveActionsStep({ formData, updateField, errors }) {
      const isV = formData.conclusion_finding === "Verified";
      return (
        <div>
          <TextAreaComp id="corrective_actions" label="Describe any action(s) taken as a result of the investigation"
            value={formData.corrective_actions} onChange={updateField} rows={6} error={errors.corrective_actions} />
          <TextAreaComp id="corrective_oversight" label="Describe the plan for oversight of implementation"
            value={formData.corrective_oversight} onChange={updateField} rows={6} error={errors.corrective_oversight} />
          {isV && <TextAreaComp id="corrective_counseling" label="Counseling or interventions planned/implemented to assist the resident"
            value={formData.corrective_counseling} onChange={updateField} rows={6} error={errors.corrective_counseling}
            helperText="Required when verified abuse (physical, sexual, or mental) was found." />}
          <TextAreaComp id="corrective_systemic" label="Systemic corrections (staffing patterns, policies, training)"
            value={formData.corrective_systemic} onChange={updateField} rows={6} error={errors.corrective_systemic} />
          <TextAreaComp id="corrective_le_status" label="Law enforcement/agency status"
            value={formData.corrective_le_status} onChange={updateField} rows={4} error={errors.corrective_le_status} />
        </div>
      );
    }

    /* ==============================================================
       STEP VALIDATION (no mandatory fields)
       ============================================================== */

    function validateStep(stepDef, formData) {
      return {};
    }

    /* ==============================================================
       PROGRESS BAR
       ============================================================== */

    function ProgressBar({ currentStep, totalSteps, steps }) {
      const pct = ((currentStep + 1) / totalSteps) * 100;
      return (
        <div className="mb-6">
          <div className="flex justify-between items-center mb-2">
            <span className="text-sm font-semibold text-mdh-blue">Step {currentStep + 1} of {totalSteps}</span>
            <span className="text-sm text-gray-500">{steps[currentStep]?.title}</span>
          </div>
          <div className="w-full bg-gray-200 rounded-full h-3">
            <div className="bg-mdh-blue h-3 rounded-full transition-all duration-300" style={{ width: pct + "%" }} />
          </div>
          <div className="flex mt-2 gap-1 overflow-x-auto pb-1">
            {steps.map((s, i) => (
              <div key={i} className={"text-xs px-2 py-1 rounded-full whitespace-nowrap " +
                (i < currentStep ? "bg-green-100 text-green-700" : i === currentStep ? "bg-mdh-blue text-white" : "bg-gray-100 text-gray-500")}>
                {s.title}
              </div>
            ))}
          </div>
        </div>
      );
    }

    /* ==============================================================
       REVIEW / SUMMARY STEP
       ============================================================== */

    function ReviewStep({ formData, steps, formType, onEdit }) {
      const [collapsed, setCollapsed] = useState({});
      const toggle = idx => setCollapsed(p => ({ ...p, [idx]: !p[idx] }));

      const renderValue = val => {
        if (val === undefined || val === null || val === "") return <span className="text-gray-400 italic">Not provided</span>;
        if (typeof val === "boolean") return val ? "Yes" : "No";
        if (Array.isArray(val)) {
          if (val.length === 0) return <span className="text-gray-400 italic">None</span>;
          return val.map((v, i) => {
            const optLabel = ALLEGATION_OPTIONS.find(o => o.id === v)?.label || v;
            return <span key={i} className="inline-block bg-mdh-accent text-mdh-blue text-sm px-2 py-1 rounded mr-1 mb-1">{optLabel}</span>;
          });
        }
        return String(val);
      };

      const renderRow = (label, value) => (
        <div className="grid grid-cols-1 md:grid-cols-3 gap-2 py-2 border-b border-gray-100">
          <div className="font-medium text-gray-700 text-sm">{label}</div>
          <div className="md:col-span-2 text-sm whitespace-pre-wrap">{renderValue(value)}</div>
        </div>
      );

      const renderStepReview = (step, idx) => {
        if (step.type === "allegation_type") {
          return (
            <div>
              {renderRow("Selected allegation types", formData.allegation_types)}
              {(formData.allegation_types || []).map(t => {
                const detail = formData.allegation_details?.[t];
                if (!detail) return null;
                return renderRow("Details \u2014 " + (ALLEGATION_OPTIONS.find(o => o.id === t)?.label || t), detail);
              })}
            </div>
          );
        }
        if (step.type === "multi_entry") {
          return (formData[step.dataKey] || []).map((entry, ei) => (
            <div key={ei} className="mb-2">
              <p className="text-sm font-semibold text-mdh-blue mb-1">{step.entryLabel} #{ei + 1}</p>
              {step.fields.map(f => renderRow(f.label, f.type === "date" ? formatDateDisplay(entry[f.id]) : entry[f.id]))}
            </div>
          ));
        }
        if (step.type === "witness_entry") {
          if (formData.no_witnesses) return renderRow("Witnesses", "No witnesses to report");
          const ws = formData.witnesses || [];
          if (ws.length === 0) return renderRow("Witnesses", "None entered");
          return ws.map((w, i) => (
            <div key={i} className="mb-2">
              <p className="text-sm font-semibold text-mdh-blue mb-1">Witness #{i + 1}</p>
              {renderRow("Full Name", w.name)}{renderRow("Position", w.position)}
              {renderRow("Relationship", w.relationship)}{renderRow("Contact", w.contact)}
            </div>
          ));
        }
        if (step.type === "conclusion_step") {
          return (
            <div>
              {renderRow("Finding", formData.conclusion_finding)}
              {formData.conclusion_finding === "Verified" && renderRow("Evidence", formData.conclusion_verified)}
              {formData.conclusion_finding === "Not Verified" && renderRow("Reason", formData.conclusion_not_verified)}
              {formData.conclusion_finding === "Inconclusive" && renderRow("Explanation", formData.conclusion_inconclusive)}
              {renderRow("Injury from abuse/neglect", formData.injury_abuse_neglect)}
            </div>
          );
        }
        if (step.type === "corrective_actions_step") {
          return (
            <div>
              {renderRow("Actions taken", formData.corrective_actions)}
              {renderRow("Oversight plan", formData.corrective_oversight)}
              {formData.conclusion_finding === "Verified" && renderRow("Counseling/interventions", formData.corrective_counseling)}
              {renderRow("Systemic corrections", formData.corrective_systemic)}
              {renderRow("LE/agency status", formData.corrective_le_status)}
            </div>
          );
        }
        return (step.fields || []).map(f => {
          if (f.showWhen && !f.showWhen.values.includes(formData[f.showWhen.field])) return null;
          let dv = formData[f.id];
          if (f.type === "date") dv = formatDateDisplay(dv);
          if (f.type === "time") dv = formatTimeDisplay(dv);
          return renderRow(f.label, dv);
        });
      };

      return (
        <div>
          <h2 className="text-xl font-bold text-mdh-blue mb-4">Review Your Submission</h2>
          <p className="text-sm text-gray-600 mb-6">Review all information below. Click "Edit" on any section to make changes.</p>
          {steps.map((step, idx) => {
            const isOpen = !collapsed[idx];
            return (
              <div key={idx} className="border border-gray-200 rounded-lg mb-3 overflow-hidden">
                <button type="button" onClick={() => toggle(idx)}
                  className="w-full flex justify-between items-center px-5 py-3 bg-gray-50 hover:bg-gray-100 transition-colors cursor-pointer">
                  <span className="font-semibold text-mdh-blue">Section {step.id}: {step.title}</span>
                  <div className="flex items-center gap-3">
                    <span onClick={e => { e.stopPropagation(); onEdit(idx); }}
                      className="text-sm text-mdh-light hover:text-mdh-blue font-semibold underline cursor-pointer">Edit</span>
                    <svg className={"w-5 h-5 text-gray-500 transition-transform " + (isOpen ? "rotate-180" : "")}
                      fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7" />
                    </svg>
                  </div>
                </button>
                {isOpen && <div className="px-5 py-3">{renderStepReview(step, idx)}</div>}
              </div>
            );
          })}
        </div>
      );
    }

    /* ==============================================================
       DOCX EXPORT -- EXACT OFFICIAL FORM REPRODUCTION
       ============================================================== */

    function buildInitialReportDocx(formData) {
      const lib = window.docxLib;
      const { Document, Packer, Paragraph, TextRun, Table, TableRow, TableCell,
              AlignmentType, BorderStyle, WidthType, ShadingType, convertInchesToTwip } = lib;

      const COL_W = 4778; // each column in dxa (3.32 inches)
      const TABLE_W = 9556; // total table width in dxa

      const allBorders = {
        top: { style: BorderStyle.SINGLE, size: 1 },
        bottom: { style: BorderStyle.SINGLE, size: 1 },

      function mergedRow(paragraphs, shading) {
        const cellOpts = {
          columnSpan: 2,
          borders: allBorders,
          children: Array.isArray(paragraphs) ? paragraphs : [paragraphs],
        };
        if (shading) cellOpts.shading = { fill: shading, type: ShadingType.CLEAR };

    async function exportToDocx(formData, formType) {
      const lib = window.docxLib;
      if (!lib) { alert("Word export library is still loading. Please wait a moment and try again."); return; }
      const { Packer } = lib;

      const isInit = formType === "initial";
      const doc = isInit ? buildInitialReportDocx(formData) : buildFollowUpReportDocx(formData);
      const blob = await Packer.toBlob(doc);
      const ds = new Date().toISOString().slice(0, 10);
      downloadBlob(blob, (isInit ? "FRI_Initial_Report_" : "FRI_FollowUp_Report_") + ds + ".docx");
    }

    function FormWizard({ formType, onReset }) {
      const isInit = formType === "initial";
      const formNum = isInit ? "39-555F" : "39-556F";
      const steps = isInit ? INITIAL_STEPS : FOLLOWUP_STEPS;
      const total = steps.length;

      const [cur, setCur] = useState(0);
      const [formData, setFormData] = useState(() => getInitialFormData(formType));
      const [errors, setErrors] = useState({});
      const [showReview, setShowReview] = useState(false);

      useEffect(() => {
        const handler = e => { e.preventDefault(); e.returnValue = ""; };
        window.addEventListener("beforeunload", handler);
        return () => window.removeEventListener("beforeunload", handler);
      }, []);

      const updateField = useCallback((id, value) => {
        setFormData(p => ({ ...p, [id]: value }));
        setErrors(p => { const n = { ...p }; delete n[id]; return n; });
      }, []);

      const handleNext = () => {
        const errs = validateStep(steps[cur], formData);
        if (Object.keys(errs).length > 0) { setErrors(errs); window.scrollTo({ top: 0, behavior: "smooth" }); return; }
        setErrors({});
        if (cur >= total - 1) setShowReview(true); else setCur(s => s + 1);
        window.scrollTo({ top: 0, behavior: "smooth" });
      };

      const handleBack = () => {
        if (showReview) setShowReview(false); else if (cur > 0) setCur(s => s - 1);
        setErrors({}); window.scrollTo({ top: 0, behavior: "smooth" });
      };

      const editFromReview = idx => { setShowReview(false); setCur(idx); window.scrollTo({ top: 0, behavior: "smooth" }); };

      const renderStep = () => {
        const step = steps[cur];
        if (step.type === "allegation_type") return <AllegationTypeStep formData={formData} updateField={updateField} errors={errors} />;
        if (step.type === "multi_entry") return <MultiEntryStep step={step} formData={formData} updateField={updateField} errors={errors} />;
        if (step.type === "witness_entry") return <WitnessEntryStep formData={formData} updateField={updateField} errors={errors} />;
        if (step.type === "conclusion_step") return <ConclusionStep formData={formData} updateField={updateField} errors={errors} />;
        if (step.type === "corrective_actions_step") return <CorrectiveActionsStep formData={formData} updateField={updateField} errors={errors} />;
        return (
          <div>
            {step.instructions && <p className="text-sm text-gray-600 mb-4 bg-blue-50 border border-blue-200 rounded p-3">{step.instructions}</p>}
            {step.fields.map(f => renderField(f, formData, updateField, errors))}
          </div>
        );
      };

      return (
        <div className="min-h-screen bg-gray-50">
          <header className="bg-mdh-blue text-white shadow-md">
            <div className="max-w-4xl mx-auto px-4 py-4">
              <p className="text-sm font-medium opacity-90">Maryland Department of Health</p>
              <p className="text-lg font-bold">Office of Health Care Quality</p>
              <p className="text-sm opacity-80 mt-1">{isInit ? "FRI Initial Report" : "FRI Follow-Up Investigation Report"} &mdash; Form {formNum}</p>
            </div>
          </header>
          <main className="max-w-4xl mx-auto px-4 py-6">
            {showReview ? (
              <>
                <ReviewStep formData={formData} steps={steps} formType={formType} onEdit={editFromReview} />
                <div className="mt-8 flex flex-col sm:flex-row gap-4">
                  <button type="button" onClick={handleBack}
                    className="inline-flex items-center justify-center px-8 py-3 text-base font-semibold text-mdh-blue bg-white border-2 border-mdh-blue rounded-lg hover:bg-mdh-accent cursor-pointer">
                    &larr; Back to Last Step
                  </button>
                  <button type="button" onClick={() => exportToDocx(formData, formType)}
                    className="inline-flex items-center justify-center px-8 py-3 text-base font-semibold text-white bg-mdh-blue rounded-lg hover:bg-mdh-light cursor-pointer">
                    Export to Word Document
                  </button>
                </div>
                <div className="mt-6 pt-6 border-t border-gray-200">
                  <button type="button" onClick={onReset} className="text-sm text-gray-500 hover:text-red-600 underline cursor-pointer">
                    Start Over (new form)
                  </button>
                </div>
                <SelfReportLink />
              </>
            ) : (
              <>
                <ProgressBar currentStep={cur} totalSteps={total} steps={steps} />
                <div className="bg-white rounded-xl shadow-sm border border-gray-200 p-6 md:p-8">
                  <h2 className="text-xl font-bold text-mdh-blue mb-1">Section {steps[cur].id}: {steps[cur].title}</h2>
                  <hr className="border-gray-200 mb-6" />
                  {renderStep()}
                </div>
                <div className="flex justify-between items-center mt-6">
                  <button type="button" onClick={handleBack} disabled={cur === 0}
                    className={"inline-flex items-center justify-center px-8 py-3 text-base font-semibold text-mdh-blue bg-white border-2 border-mdh-blue rounded-lg hover:bg-mdh-accent cursor-pointer" + (cur === 0 ? " opacity-50 cursor-not-allowed" : "")}>
                    &larr; Back
                  </button>
                  <button type="button" onClick={handleNext}
                    className="inline-flex items-center justify-center px-8 py-3 text-base font-semibold text-white bg-mdh-blue rounded-lg hover:bg-mdh-light cursor-pointer">
                    {cur >= total - 1 ? "Review & Finish" : "Next \u2192"}
                  </button>
                </div>
                <SelfReportLink />
              </>
            )}
          </main>
        </div>
      );
    }

    /* ==============================================================
       APP ENTRY POINT
       ============================================================== */

    function App() {
      const [formType, setFormType] = useState(null);

      if (!formType) {
        return (
          <div className="min-h-screen bg-gray-50 flex items-center justify-center px-4">
            <div className="max-w-2xl w-full">
              <div className="text-center mb-10">
                <h1 className="text-2xl font-bold text-mdh-blue mb-1">Maryland Department of Health</h1>
                <h2 className="text-lg font-semibold text-gray-700">Office of Health Care Quality</h2>
                <p className="text-gray-500 mt-2">Facility Reported Incident &mdash; Form Wizard</p>
              </div>
              <div className="grid gap-6 md:grid-cols-2">
                <button type="button" onClick={() => setFormType("initial")}
                  className="bg-white rounded-xl border-2 border-gray-200 p-6 text-left hover:border-mdh-blue hover:shadow-lg transition-all cursor-pointer group">
                  <div className="text-xs font-semibold text-mdh-light mb-2">FORM 39-555F</div>
                  <h3 className="text-lg font-bold text-gray-900 mb-2">FRI Initial Report</h3>
                  <p className="text-sm text-gray-600 mb-4">File within <strong>2 hours</strong> for serious bodily injury/abuse, or <strong>24 hours</strong> otherwise.</p>
                  <div className="text-mdh-blue font-semibold text-sm group-hover:underline">Start &rarr;</div>
                </button>
                <button type="button" onClick={() => setFormType("followup")}
                  className="bg-white rounded-xl border-2 border-gray-200 p-6 text-left hover:border-mdh-blue hover:shadow-lg transition-all cursor-pointer group">
                  <div className="text-xs font-semibold text-mdh-light mb-2">FORM 39-556F</div>
                  <h3 className="text-lg font-bold text-gray-900 mb-2">FRI Follow-Up Investigation</h3>
                  <p className="text-sm text-gray-600 mb-4">File within <strong>5 business days</strong> of the incident.</p>
                  <div className="text-mdh-blue font-semibold text-sm group-hover:underline">Start &rarr;</div>
                </button>
              </div>
              <p className="text-xs text-gray-400 text-center mt-8">Coffman Nursing Home &amp; Rehabilitation Center &mdash; Compliance Tool</p>
              <SelfReportLink />
            </div>
          </div>
        );
      }

      return <FormWizard formType={formType} onReset={() => setFormType(null)} />;
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
